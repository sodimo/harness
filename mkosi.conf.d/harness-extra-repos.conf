[Match]
Distribution=fedora

[Build]
SandboxTrees=repos/tailscale.repo:/etc/yum.repos.d/tailscale.repo
SandboxTrees=repos/antigravity.repo:/etc/yum.repos.d/antigravity.repo
SandboxTrees=repos/cloudflared.repo:/etc/yum.repos.d/cloudflared.repo

[Distribution]
Repositories=cloudflared

[Content]
WithRecommends=false
# cloudflared is version-pinned (principle 1: pin every version — see D-167).
# Cloudflare's upstream stable RPM repo publishes a single rolling
# `cloudflared-linux-x86_64.rpm` file, so a rebuild without a pin would
# silently pull a newer release. Bumping this pin is a dated commit.
# Current pin: 2026.3.0-1 (repo snapshot 2026-04-22).
# Upgrade cadence: monthly review of cloudflared stable releases.
Packages=
    antigravity
    cloudflared-2026.3.0-1
    libxcrypt-compat
