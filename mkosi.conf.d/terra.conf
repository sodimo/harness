[Match]
Distribution=fedora

[Build]
SandboxTrees=repos/terra.repo:/etc/yum.repos.d/terra.repo

[Distribution]
Repositories=terra

[Content]
WithRecommends=false
Packages=
    terra-release
    terra-release-extras
    nautilus-open-any-terminal
    xdg-terminal-exec-nautilus
    iio-niri
    valent
    # Remote-display stack for the Framework Desktop harness:
    # sunshine is the host-side streamer (runs on the harness) and
    # moonlight-qt is the client. Shipping both so the same image can
    # serve the niri WM frontend to another device and also connect
    # back to other Sunshine hosts. See sodimo/harness#9, #1 VNC note.
    sunshine
    moonlight-qt
