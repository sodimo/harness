[Match]
Distribution=fedora

[Build]
SandboxTrees=repos/terra.repo:/etc/yum.repos.d/terra.repo

[Distribution]
Repositories=terra

[Content]
WithRecommends=false
Packages=
    terra-release
    terra-release-extras
    nautilus-open-any-terminal
    xdg-terminal-exec-nautilus
    iio-niri
    uupd
    valent
    # TODO(#9): sunshine + moonlight-qt are NOT in terra44 — they live in the
    # LizardByte COPR (copr.fedorainfracloud.org/coprs/lizardbyte/beta/). The
    # original commit d510e22 assumed they were in terra; that was wrong and
    # has kept CI red since 2026-04-22. Wire the LizardByte COPR (new
    # repos/lizardbyte-beta.repo + mkosi.conf.d/lizardbyte.conf) before
    # re-enabling these packages. Kept as comments so the intent isn't lost.
    # sunshine
    # moonlight-qt
