# Allow rootless user-scope podman quadlets to bind low ports.
# Needed for the self-hosted mail stack (25/143/465/587/993) and Caddy (80/443).
# Applied once at the OS layer so unit files don't need setcap or port shifting.
# Cross-ref: sodimo/harness#8, manual ch35-harness.
net.ipv4.ip_unprivileged_port_start=0
