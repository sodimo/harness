---
name: Build container image
on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
      - "docs/**"
      - "LATEST/**"
  schedule:
    - cron: "05 10 * * *"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_NAME: "harness"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    timeout-minutes: 90
    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Init submodules (non-recursive)
        run: git submodule update --init --depth=1

      - name: Setup Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Setup mkosi cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: mkosi.cache
          key: ${{ runner.os }}-mkosi-${{ env.IMAGE_NAME }}-amd64
          restore-keys: |
            ${{ runner.os }}-mkosi-${{ env.IMAGE_NAME }}-amd64

      - name: Install mkosi
        run: |
          set -x
          sudo apt install -y --no-install-recommends bubblewrap debian-archive-keyring python3-gpg python3-hawkey python3-libcomps python3-unbound
          git clone https://github.com/systemd/mkosi.git
          sudo mv mkosi /usr/src/mkosi
          sudo ln -sf "/usr/src/mkosi/bin/mkosi" /usr/bin/mkosi

      - name: Build image
        run: |
          sudo env IMAGE_FULL="localhost/${IMAGE_NAME}:${DEFAULT_TAG}" mkosi -B -ff

      - name: Load image
        run: |
          sudo env IMAGE_FULL="localhost/${IMAGE_NAME}:${DEFAULT_TAG}" $(which just) load

      - name: Lint image
        run: |
          sudo env IMAGE_FULL="localhost/${IMAGE_NAME}:${DEFAULT_TAG}" $(which just) lint

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y%m%d)" | tee "${GITHUB_OUTPUT}"

      - name: Free disk space for rechunk
        run: |
          sudo rm -rf mkosi.profiles/bootc-ostree/mkosi.output
          sudo rm -rf /tmp/mkosi-*
          df -h /

      - name: Run Rechunker
        id: rechunk
        uses: ublue-os/legacy-rechunk@a925083d9af7cb04b3e2a6e8c01bfa495f38b710 # v1.0.0
        with:
          rechunk: 'ghcr.io/ublue-os/legacy-rechunk:v1.0.0-x86_64'
          ref: "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
          prev-ref: "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
          skip_compression: true
          version: "${{ steps.date.outputs.date }}"
          labels: |
            containers.bootc=1
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Hack around permission issue caching
        run: |
          sudo chmod 777 --recursive mkosi.cache

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN_USER: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login -u "${LOGIN_USER}" --password-stdin "ghcr.io"
          echo "${GITHUB_TOKEN}" | docker login -u "${LOGIN_USER}" --password-stdin "ghcr.io"

      - name: Push to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          RECHUNK_REF: "${{ steps.rechunk.outputs.ref }}"
        run: |
          set -x
          for tag in "${DEFAULT_TAG}" "${{ steps.date.outputs.date }}"; do
            sudo skopeo copy "${RECHUNK_REF}" "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}"
          done
          DIGEST=$(sudo skopeo inspect --format '{{.Digest}}' "${RECHUNK_REF}")
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        if: github.event_name != 'pull_request'

      - name: Sign Image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: cosign sign -y --new-bundle-format=false --use-signing-config=false --key env://COSIGN_PRIVATE_KEY "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"
