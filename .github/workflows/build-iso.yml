---
name: Build ISO
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  build_iso:
    name: Build installation ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Build ISO
        id: build-iso
        uses: osbuild/bootc-image-builder-action@main
        with:
          config-file: ./iso.toml
          image: ghcr.io/mecattaf/harness:latest
          types: anaconda-iso
          rootfs: btrfs

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v5
        with:
          name: harness-iso-${{ github.run_number }}
          path: ${{ steps.build-iso.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true
