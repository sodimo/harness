---
name: Build ISO
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  build_iso:
    name: Build installation ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2

      - name: Redirect ISO output to /mnt
        run: |
          set -eux
          sudo mkdir -p /mnt/iso-output
          sudo chown "$(id -u):$(id -g)" /mnt/iso-output
          ln -s /mnt/iso-output "${GITHUB_WORKSPACE}/output"
          df -h /

      - name: Build ISO
        id: build-iso
        uses: osbuild/bootc-image-builder-action@main
        with:
          config-file: ./iso.toml
          image: ghcr.io/sodimo/harness:latest
          types: anaconda-iso
          rootfs: btrfs

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v5
        with:
          name: harness-iso-${{ github.run_number }}
          path: ${{ steps.build-iso.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true
